# SECURITY FIX_005: Production Environment Configuration
# Weakness ID: Wk_005
# Fix ID: Fix_005 – Secure Configuration Management
# STRIDE: Information Disclosure
# OWASP: A05 Security Misconfiguration
# CWE: CWE-798
# CIA: Confidentiality
# ASVS: V3.4 – Session Cookie Management, V6.4 – Secure Configuration
# D3FEND: D3-SCF Secure Configuration File
#
# Usage: Run with: spring.profiles.active=prod
# Set all environment variables before deployment

# Database Configuration - MUST be set via environment variables
# DO NOT hardcode credentials here
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.generate_statistics=false

# Server Configuration
server.port=${SERVER_PORT:8443}
server.servlet.context-path=/
server.compression.enabled=true

# HTTPS/SSL Configuration
server.ssl.enabled=true
server.ssl.key-store=${KEYSTORE_PATH}
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${KEY_ALIAS:tomcat}

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

# Logging Configuration
logging.level.root=WARN
logging.level.com.ABC.ABC_FComplaintWebapp=INFO
logging.file.name=/var/log/abc_complaint_app/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Security Headers
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=30m

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,metrics
management.endpoints.web.exposure.exclude=shutdown
management.endpoint.health.show-details=when-authorized
