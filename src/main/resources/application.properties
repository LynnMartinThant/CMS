# SECURITY FIX_005: Externalized Secrets through Environment-Based Configuration
# Weakness ID: Wk_005
# Fix ID: Fix_005 – Removed Hardcoded Credentials & Secure Configuration Management
# STRIDE: Information Disclosure
# OWASP: A05 Security Misconfiguration
# CWE: CWE-798
# CIA: Confidentiality
# ASVS: V3 – Session Management, V6.4 – Cryptography
# D3FEND: D3-SCF Secure Configuration File
#
# CRITICAL: Database credentials are now managed via environment variables
# DO NOT commit actual credentials to version control
# Set environment variables on deployment:
#   export SPRING_DATASOURCE_URL=jdbc:mysql://host:3306/db_name
#   export SPRING_DATASOURCE_USERNAME=db_user
#   export SPRING_DATASOURCE_PASSWORD=secure_password
# Or use application-prod.properties for production

# Database Configuration (using environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/complaint_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.complaint=DEBUG

# Security Configuration
# SECURITY: Enable HTTPS in production
server.ssl.enabled=false
# server.ssl.key-store=${KEYSTORE_PATH}
# server.ssl.key-store-password=${KEYSTORE_PASSWORD}
# server.ssl.key-store-type=PKCS12